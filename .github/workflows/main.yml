name: Daily Spanish Workout

on:
  schedule:
    - cron: '0 12 * * *'  # Runs automatically every day at 12:00 UTC (Adjust as needed)
  workflow_dispatch:     # <-- THIS line is what gives you the manual "Run workflow" button!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Spanish Generator
        env:
          # This pulls secrets you save in your repo settings, just like your news app
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python generate_workout.py
