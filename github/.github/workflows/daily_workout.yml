name: Email Daily Spanish Workout

on:
  schedule:
    # This automatically runs at 11:00 UTC every single day (6:00 AM EST / 5:00 AM CST)
    - cron: '0 11 * * *'
  workflow_dispatch: # This creates a manual play button so you can test it instantly

jobs:
  generate-and-email:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Workout Generator
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python generate_workout.py

    - name: Send Daily Email
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.SMTP_USER }}
        password: ${{ secrets.SMTP_PASSWORD }}
        subject: "🧠 Mi Entrenamiento Diario de Español"
        to: ${{ secrets.TO_EMAIL }}
        from: "Your Spanish Coach <${{ secrets.SMTP_USER }}>"
        html_body: file://workout.html
