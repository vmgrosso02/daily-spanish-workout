name: Daily Spanish Workout
on:
  workflow_dispatch: # Allows you to run it manually with a button
  schedule:
    - cron: '0 11 * 3,4,5,6,7,8,9,10 *'   # 7:00 AM Miami time (EDT, UTC-4) — Mar through Oct
    - cron: '0 12 * 1,2,11,12 *'          # 7:00 AM Miami time (EST, UTC-5) — Nov, Dec, Jan, Feb

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run Python script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python generate_workout.py

      - name: Commit updated word and phrase banks
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add word_bank.json phrase_bank.json word_bank.txt phrase_bank.txt
          git diff --staged --quiet || git commit -m "Automated update of word & phrase banks [skip ci]"
          git push
